<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notion Embed Preview - Weekly Timeline</title>
  <style>
    :root{
      --page:#fbfbfa;
      --ink:#37352f;
      --muted:#787774;
      --line:#e9e9e6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--page);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    }
    .notion-page{
      width:min(1180px, calc(100vw - 64px));
      margin:44px auto 64px;
    }
    .crumb{font-size:13px;color:var(--muted);margin-bottom:28px}
    h1{font-size:34px;letter-spacing:-.03em;margin:0 0 10px;font-weight:750}
    .desc{font-size:14px;color:var(--muted);margin:0 0 24px;line-height:1.6}
    .embed-label{font-size:12px;color:var(--muted);margin:0 0 8px}
    .embed-frame{
      width:100%;
      height:650px;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }
    iframe{width:100%;height:100%;border:0;display:block}
  </style>
</head>
<body>
  <main class="notion-page">
    <div class="crumb">Workspace / Project / Weekly Timeline</div>
    <h1>협업 주간 타임라인</h1>
    <p class="desc">Notion 페이지에 <code>/embed</code>로 삽입했을 때 보이는 크기를 가정한 미리보기입니다.</p>
    <p class="embed-label">Embed preview</p>
    <div class="embed-frame">
      <iframe src="././index.html" title="Weekly Timeline Widget"></iframe>
    </div>
  </main>
</body>
</html>
